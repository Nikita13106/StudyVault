<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>StudyVault — Share &amp; Find Academic Resources</title>
    <meta
      name="description"
      content="StudyVault is a free hub where students upload and download academic resources — notes, PDFs, slides and more."
    />
    <meta
      name="keywords"
      content="student resources, study notes, PDF sharing, academic resources, StudyVault"
    />
    <meta name="author" content="StudyVault" />

    <!-- Open Graph (link previews on social / chat apps) -->
    <meta property="og:title" content="StudyVault — Share & Find Academic Resources" />
    <meta property="og:description" content="Upload and download academic resources instantly." />
    <meta property="og:type" content="website" />

    <!-- Fonts: Fraunces (display) + Hanken Grotesk (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
